<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rydberg Blockade CZ Gate</title>
<style>
  :root {
    --ink:#0f172a; --muted:#475569; --line:#dbe3ef; --bg:#f8fbff;
    --blue:#2563eb; --red:#dc2626; --orange:#f97316; --green:#16a34a; --purple:#7c3aed;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
  body { overflow:hidden; }
  .app { width:100%; height:650px; padding:14px; display:grid; grid-template-rows:auto auto 1fr; gap:10px; }
  .top { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
  h1 { margin:0; font-size:22px; line-height:1.15; }
  .sub { margin:4px 0 0; color:var(--muted); font-size:14px; line-height:1.35; }
  .formula { background:#0f172a; color:white; border-radius:12px; padding:9px 12px; font:700 16px/1.2 Consolas, monospace; white-space:nowrap; }
  .controls { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
  .panel { background:white; border:1px solid var(--line); border-radius:16px; padding:10px 12px; box-shadow:0 8px 22px rgba(15,23,42,.06); }
  .label { font-size:12px; color:var(--muted); font-weight:800; letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
  .steps, .states { display:flex; flex-wrap:wrap; gap:7px; }
  button { border:1px solid var(--line); background:#fff; border-radius:999px; padding:7px 10px; cursor:pointer; font-weight:750; color:var(--ink); }
  button.active { background:var(--blue); color:#fff; border-color:var(--blue); }
  .main { display:grid; grid-template-columns: 1.15fr .85fr; gap:10px; min-height:0; }
  .viz { background:white; border:1px solid var(--line); border-radius:18px; padding:10px; box-shadow:0 8px 22px rgba(15,23,42,.06); min-height:0; }
  svg { width:100%; height:100%; display:block; }
  .side { display:grid; grid-template-rows:auto 1fr; gap:10px; min-height:0; }
  .explain { background:white; border:1px solid var(--line); border-radius:18px; padding:12px; box-shadow:0 8px 22px rgba(15,23,42,.06); font-size:14px; line-height:1.45; }
  .explain b { color:var(--blue); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { padding:7px 8px; border-bottom:1px solid var(--line); text-align:left; }
  th { background:#f1f5f9; }
  tr.active { background:#fff7ed; outline:2px solid #fed7aa; }
  .tag { border-radius:999px; padding:3px 7px; font-size:12px; font-weight:800; white-space:nowrap; }
  .normal { background:#dcfce7; color:#166534; }
  .blocked { background:#ffedd5; color:#9a3412; }
  .phase { background:#ede9fe; color:#5b21b6; }
  .pulse { stroke-dasharray:8 6; animation:dash 1.1s linear infinite; }
  @keyframes dash { to { stroke-dashoffset:-28; } }
  @media (max-width: 760px) {
    .app { height:760px; overflow:hidden; }
    .top, .controls, .main { grid-template-columns:1fr; display:grid; }
    h1 { font-size:19px; }
    .formula { justify-self:start; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <h1>Rydberg Blockade CZ Gate: Compact Interactive View</h1>
      <p class="sub">Click a step and an input state to see when the target pulse is blockaded, and why <b>|r,r&gt;</b> gets <b>-1</b> phase</p>
    </div>
    <div class="formula">CZ = diag(1, 1, 1, -1)</div>
  </div>

  <div class="controls">
    <div class="panel">
      <div class="label">Step</div>
      <div class="steps" id="steps"></div>
    </div>
    <div class="panel">
      <div class="label">Input state</div>
      <div class="states" id="states"></div>
    </div>
  </div>

  <div class="main">
    <div class="viz">
      <svg viewBox="0 0 720 420" aria-label="CZ gate via Rydberg blockade">
        <defs>
          <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#2563eb"/></marker>
          <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 Z" fill="#f97316"/></marker>
        </defs>
        <rect x="16" y="18" width="692" height="384" rx="24" fill="#f8fafc" stroke="#dbe3ef"/>
        <text x="58" y="52" fill="#2563eb" font-weight="800" font-size="17">Control atom</text>
        <text x="58" y="262" fill="#dc2626" font-weight="800" font-size="17">Target atom</text>
        <line x1="110" y1="96" x2="620" y2="96" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
        <line x1="110" y1="306" x2="620" y2="306" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>

        <circle id="haloC" cx="185" cy="96" r="55" fill="none" stroke="#f97316" stroke-width="4" stroke-dasharray="7 7" opacity="0"/>
        <circle id="haloT" cx="185" cy="306" r="55" fill="none" stroke="#f97316" stroke-width="4" stroke-dasharray="7 7" opacity="0"/>

        <g filter="drop-shadow(0 8px 10px rgba(15,23,42,.16))">
          <circle cx="185" cy="96" r="32" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
          <text id="cLabel" x="185" y="104" text-anchor="middle" fill="#1d4ed8" font-size="24" font-weight="900">g</text>
          <circle cx="185" cy="306" r="32" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
          <text id="tLabel" x="185" y="314" text-anchor="middle" fill="#b91c1c" font-size="24" font-weight="900">g</text>
        </g>

        <path id="pulsePath" class="pulse" d="M365 185 C425 120, 505 120, 565 185 C505 250, 425 250, 365 185" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrowBlue)"/>
        <text id="pulseLabel" x="440" y="176" fill="#2563eb" font-size="18" font-weight="900">pi pulse</text>

        <g id="xMark" opacity="0">
          <line x1="488" y1="244" x2="570" y2="326" stroke="#f97316" stroke-width="11" stroke-linecap="round"/>
          <line x1="570" y1="244" x2="488" y2="326" stroke="#f97316" stroke-width="11" stroke-linecap="round"/>
          <text x="529" y="352" text-anchor="middle" fill="#f97316" font-size="18" font-weight="900">BLOCKED</text>
        </g>

        <text id="stateLine" x="360" y="382" text-anchor="middle" fill="#334155" font-size="17" font-weight="800">state</text>
        <text id="phaseLine" x="600" y="54" text-anchor="end" fill="#7c3aed" font-size="20" font-weight="900"></text>
      </svg>
    </div>

    <div class="side">
      <div class="explain" id="explain"></div>
      <div class="explain">
        <table>
          <thead><tr><th>Input</th><th>Input state</th><th>Action</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const steps = [
  {name:'Init', pulse:'prepare', explain:'Initialize the computational basis states. The goal is that all states return to the computational basis, while |r,r> receives an extra -1 phase.'},
  {name:'pi pulse', pulse:'pi pulse', explain:'The first pulse tries to flip the target atom. If the control atom is in r, the |r,r> level is shifted by V12 and the target excitation is blockaded.'},
  {name:'2pi pulse', pulse:'2pi phase pulse', explain:'The 2pi pulse makes participating amplitudes complete a closed Rabi loop and accumulate phase. Blockade changes the path for |r,r>, leaving a conditional phase difference.'},
  {name:'reverse pi', pulse:'reverse pi', explain:'The final reverse pi pulse restores the target atom. In the end only |r,r> has phase -1, which is the CZ gate.'}
];
const states = {
  gg:{label:'|g,g>', final:'+1', behavior:'normal', trace:[['g','g'],['g','r'],['g','r'],['g','g']]},
  gr:{label:'|g,r>', final:'+1', behavior:'normal', trace:[['g','r'],['g','g'],['g','g'],['g','r']]},
  rg:{label:'|r,g>', final:'+1', behavior:'blocked target', trace:[['r','g'],['r','g'],['r','g'],['r','g']]},
  rr:{label:'|r,r>', final:'-1', behavior:'conditional phase', trace:[['r','r'],['r','r'],['r','r'],['r','r']]}
};
let currentStep = 0;
let currentState = 'rr';

function makeButton(text, onClick) {
  const b = document.createElement('button');
  b.textContent = text;
  b.onclick = onClick;
  return b;
}
function init() {
  steps.forEach((s,i) => {
    const b = makeButton(String(i+1) + '. ' + s.name, () => { currentStep=i; render(); });
    b.id = 'step-' + i;
    document.getElementById('steps').appendChild(b);
  });
  Object.entries(states).forEach(([k,s]) => {
    const b = makeButton(s.label, () => { currentState=k; render(); });
    b.id = 'state-' + k;
    document.getElementById('states').appendChild(b);
  });
  render();
}
function render() {
  document.querySelectorAll('#steps button').forEach((b,i)=>b.classList.toggle('active', i===currentStep));
  Object.keys(states).forEach(k => document.getElementById('state-'+k).classList.toggle('active', k===currentState));
  const s = states[currentState];
  const pair = s.trace[currentStep];
  const c = pair[0], t = pair[1];
  document.getElementById('cLabel').textContent = c;
  document.getElementById('tLabel').textContent = t;
  document.getElementById('pulseLabel').textContent = steps[currentStep].pulse;
  document.getElementById('stateLine').textContent = 'selected ' + s.label + '  ->  step view |' + c + ',' + t + '>';
  document.getElementById('phaseLine').textContent = currentStep===3 ? 'final phase ' + s.final : '';
  const hasRControl = c === 'r';
  const hasRTarget = t === 'r';
  const blocked = (currentState==='rg' || currentState==='rr') && (currentStep===1 || currentStep===2);
  document.getElementById('haloC').setAttribute('opacity', hasRControl ? '0.65' : '0');
  document.getElementById('haloT').setAttribute('opacity', hasRTarget ? '0.65' : '0');
  document.getElementById('xMark').setAttribute('opacity', blocked ? '1' : '0');
  document.getElementById('pulsePath').setAttribute('stroke', blocked ? '#f97316' : '#2563eb');
  document.getElementById('pulsePath').setAttribute('marker-end', blocked ? 'url(#arrowOrange)' : 'url(#arrowBlue)');
  document.getElementById('explain').innerHTML = '<b>' + steps[currentStep].name + '</b><br>' + steps[currentStep].explain + '<br><br><b>Selected input:</b> ' + s.label + '; final phase: <b>' + s.final + '</b>';
  const body = document.getElementById('rows');
  body.innerHTML = '';
  Object.entries(states).forEach(([k,row]) => {
    const tr = document.createElement('tr');
    if (k === currentState) tr.className = 'active';
    const klass = row.final === '-1' ? 'phase' : (row.behavior.includes('blocked') ? 'blocked' : 'normal');
    tr.innerHTML = '<td><b>' + row.label + '</b></td><td><span class="tag ' + klass + '">' + row.behavior + '</span></td><td><b>' + row.final + '</b></td>';
    body.appendChild(tr);
  });
}
init();
</script>
</body>
</html>
